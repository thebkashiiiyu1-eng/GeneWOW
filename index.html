<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | GeneWOW Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --bg: #030712;
            --text: #f9fafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Elements */
        .ambient-orb {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.2;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            background: var(--primary);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            background: var(--accent);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        /* Container */
        .main-container {
            text-align: center;
            z-index: 10;
            animation: zoomIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Premium "Hello World" Text */
        h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            letter-spacing: -4px;
            line-height: 0.9;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        h1::after {
            content: "GENEWOW";
            position: absolute;
            left: 0;
            top: 4px;
            z-index: -1;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
            filter: blur(15px);
            animation: moveGradient 4s linear infinite;
        }

        @keyframes moveGradient {
            to { background-position: 200% center; }
        }

        .sub-text {
            font-size: 1.25rem;
            color: #94a3b8;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 1.2s;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Particle Overlay */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.3;
        }

        /* GitHub Link Style */
        .github-tag {
            position: absolute;
            bottom: 2rem;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .github-tag:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="main-container">
        <h1>GENEWOW</h1>
        <div class="sub-text">PREMIUM EXPERIENCE • thebkashiiiyu1-eng</div>
    </div>

    <a href="https://github.com/thebkashiiiyu1-eng/GeneWOW" class="github-tag" target="_blank">View on GitHub Archive</a>

    <script>
        // Mouse parallax effect
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.ambient-orb');
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            
            orbs.forEach((orb, i) => {
                const depth = i === 0 ? 1 : 1.5;
                orb.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
            });
        });
    </script>
</body>
</html>
